<script type="text/javascript">
  let tawkLoaded = false;

  function loadTawk() {
    if (tawkLoaded) return;

    tawkLoaded = true;
    window.Tawk_API = window.Tawk_API || {};
    window.Tawk_LoadStart = new Date();

    const s1 = document.createElement('script');
    const s0 = document.getElementsByTagName('script')[0];
    s1.async = true;
    s1.src = 'https://embed.tawk.to/690b61d5727def194d09e47e/1j9a7caec';
    s1.charset = 'UTF-8';
    s1.setAttribute('crossorigin', '*');
    s0.parentNode.insertBefore(s1, s0);
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('itlearn.analyticsConsent') === 'accepted') {
      loadTawk();
    }
    document.querySelectorAll('[data-open-help-chat]').forEach(trigger => {
      trigger.addEventListener('click', (event) => {
        event.preventDefault();
        loadTawk();
        if (window.Tawk_API && typeof window.Tawk_API.maximize === 'function') {
          window.Tawk_API.maximize();
        }
      });
    });
  });
</script>
<!--End of Tawk.to Script-->

<!-- Login via live Flask API -->
<script>
document.addEventListener('DOMContentLoaded', async () => {
    document.body.setAttribute('data-page', 'login');
    const storedLang = localStorage.getItem('language') || 'en';
    updatePageLanguage(storedLang);
    if (window.feather) {
        feather.replace();
    }
    updateInputPlaceholders(storedLang);
    initPasswordToggle();
    updatePasswordToggleLabels(storedLang);
  initOAuthButtons();

  try {
    const resp = await fetch('https://itlearn.pythonanywhere.com/api/session', {
      method: 'GET',
      credentials: 'include'
    });
    const session = await resp.json();
    if (session && session.banned) {
      redirectToBanScreen(session);
      return;
    }
    if (session.logged_in) {
      window.location.href = '/learn/index.html';
      return;
    }
  } catch (e) {
    console.warn('Session pre-check failed:', e);
  }
  
  setTimeout(() => {
    try {
      if (typeof turnstile !== 'undefined') {
        const oldToken = turnstile.getResponse();
        console.log('[LOGIN] Page load - old token (first 20):', oldToken ? oldToken.substring(0, 20) + '...' : 'NONE');
        turnstile.reset();
        console.log('[LOGIN] Turnstile reset on page load');
      }
    } catch (e) {
      console.warn('[LOGIN] Could not reset Turnstile on load:', e);
    }
  }, 1000);
});

function updateInputPlaceholders(lang) {
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    if (emailInput) emailInput.placeholder = translations[lang]['enterEmail'] || 'Enter your email';
    if (passwordInput) passwordInput.placeholder = translations[lang]['enterPassword'] || 'Enter your password';
}

function updatePasswordToggleLabels(lang) {
    const btn = document.querySelector('.password-toggle');
    if (!btn) return;
    const show = translations[lang] && translations[lang]['showPassword'] ? translations[lang]['showPassword'] : 'Show password';
    const hide = translations[lang] && translations[lang]['hidePassword'] ? translations[lang]['hidePassword'] : 'Hide password';
    btn.dataset.showLabel = show;
    btn.dataset.hideLabel = hide;
    const isPressed = btn.getAttribute('aria-pressed') === 'true';
    btn.setAttribute('aria-label', isPressed ? hide : show);
    btn.setAttribute('title', isPressed ? hide : show);
}

function initPasswordToggle() {
    const pw = document.getElementById('password');
    const btn = document.querySelector('.password-toggle');
    if (!pw || !btn) return;

    // Ensure icons are rendered
    if (window.feather) feather.replace();

    btn.addEventListener('click', () => {
        const showing = pw.type === 'text';
        if (showing) {
            pw.type = 'password';
            btn.setAttribute('aria-pressed', 'false');
            const show = btn.dataset.showLabel || 'Show password';
            btn.setAttribute('aria-label', show);
            btn.setAttribute('title', show);
            btn.innerHTML = '<i data-feather="eye"></i>';
        } else {
            pw.type = 'text';
            btn.setAttribute('aria-pressed', 'true');
            const hide = btn.dataset.hideLabel || 'Hide password';
            btn.setAttribute('aria-label', hide);
            btn.setAttribute('title', hide);
            btn.innerHTML = '<i data-feather="eye-off"></i>';
        }
        if (window.feather) {
            feather.replace();
        }
        pw.focus();
    });
}

const OAUTH_API_BASE = 'https://itlearn.pythonanywhere.com';

function providerLabel(provider) {
  switch (provider) {
    case 'github': return 'GitHub';
    case 'discord': return 'Discord';
    default: return 'Google';
  }
}

function initOAuthButton(provider, buttonId) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;
  const labelEl = btn.querySelector('.oauth-label');
  const baseLabel = labelEl ? labelEl.textContent : btn.textContent;
  const connecting = btn.dataset.connecting || `Connecting to ${providerLabel(provider)}...`;

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    if (labelEl) {
      labelEl.textContent = connecting;
    } else {
      btn.textContent = connecting;
    }

    if (provider === 'discord') {
      const joinCheckbox = document.getElementById('join-discord-server');
      const shouldJoin = joinCheckbox ? joinCheckbox.checked : false;
      localStorage.setItem('discord_join_server', shouldJoin ? 'true' : 'false');
    }

    localStorage.setItem('oauth_origin', window.location.origin);

    try {
      const redirectTo = `${window.location.origin}/oauth-callback.html?provider=${provider}`;
      const res = await fetch(`${OAUTH_API_BASE}/api/oauth/${provider}/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ redirect_to: redirectTo })
      });

      const data = await res.json();
      if (!res.ok || !data.url) {
        const errMsg = data && data.error ? data.error : `Could not start ${providerLabel(provider)} login.`;
        throw new Error(errMsg);
      }

      window.location.href = data.url;
    } catch (err) {
      console.error(`[OAUTH][${provider}] Start failed:`, err);
      await showAlert(`Could not start ${providerLabel(provider)} sign-in. Please try again.`, { title: 'Sign-in error' });
      btn.disabled = false;
      if (labelEl) {
        labelEl.textContent = baseLabel;
      } else {
        btn.textContent = baseLabel;
      }
    }
  });
}

function initOAuthButtons() {
  initOAuthButton('google', 'google-login');
  initOAuthButton('github', 'github-login');
  initOAuthButton('discord', 'discord-login');
}

function redirectToBanScreen(payload) {
  const reason = encodeURIComponent((payload && payload.ban_reason) || 'Account suspended for severe rule violations.');
  const appeal = encodeURIComponent((payload && payload.ban_appeal_url) || 'https://discord.gg/rKgF9s32EV');
  window.location.href = `/banned.html?reason=${reason}&appeal=${appeal}`;
}

const originalUpdatePageLanguage = window.updatePageLanguage;
window.updatePageLanguage = function(lang) {
    originalUpdatePageLanguage(lang);
    updateInputPlaceholders(lang);
    updatePasswordToggleLabels(lang);
};

document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
  const submitBtn = document.querySelector('#login-form .btn');
  if (submitBtn) submitBtn.disabled = true;

      let captchaToken = turnstile.getResponse();
      const tokenPrefix = captchaToken ? captchaToken.substring(0, 20) : 'NONE';
      console.log('[LOGIN] Initial token check:', captchaToken ? 'Token exists' : 'No token');
      console.log('[LOGIN] Token prefix:', tokenPrefix);

      const lastToken = sessionStorage.getItem('last_captcha_token');
      if (lastToken && lastToken === tokenPrefix) {
        console.error('[LOGIN] ⚠️ WARNING: REUSING SAME TOKEN! Tokens are single-use only!');
        await showAlert('Please wait for CAPTCHA to reset...', { title: 'CAPTCHA' });
        if (submitBtn) submitBtn.disabled = false;
        return;
      }
      sessionStorage.setItem('last_captcha_token', tokenPrefix);
      
      if (!captchaToken) {
        console.log('[LOGIN] Waiting for token to generate...');
        for (let i = 0; i < 6; i++) {
          await new Promise(resolve => setTimeout(resolve, 500));
          captchaToken = turnstile.getResponse();
          if (captchaToken) {
            console.log('[LOGIN] Token ready after', (i + 1) * 500, 'ms');
            break;
          }
        }
      }
      
      if (!captchaToken) {
        console.error('[LOGIN] No CAPTCHA token available after waiting');
        await showAlert('CAPTCHA verification not ready. Please wait a moment and try again.', { title: 'CAPTCHA' });
        if (submitBtn) submitBtn.disabled = false;
        return;
      }

      console.log('[LOGIN] Submitting with token (first 20 chars):', captchaToken.substring(0, 20) + '...');

    try {
      const requestBody = {
        email,
        password,
        captcha_token: captchaToken
      };
      console.log('[LOGIN] Request body:', { email, captcha_token_length: captchaToken.length });
      
      const res = await fetch("https://itlearn.pythonanywhere.com/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(requestBody)
        });

      if (!res.ok) {
        let msg = 'Login failed.';
        let errorData = null;
        try {
          errorData = await res.json();
          if (errorData && errorData.error) msg = errorData.error;
        } catch {}

        if (res.status === 403 && errorData && errorData.banned) {
          redirectToBanScreen(errorData);
          return;
        }

        console.error('[LOGIN] Error details:', { 
          status: res.status, 
          errorMessage: msg, 
          fullErrorData: errorData,
          errorString: JSON.stringify(errorData)
        });

        if (res.status === 401) {
          await showAlert('Login failed: ' + (msg || 'Incorrect email or password. Please check your credentials.'), { title: 'Login failed' });
        } else if (res.status === 400) {
          await showAlert('Login failed: ' + (msg || 'Invalid request or CAPTCHA failed. Please try again.'), { title: 'Login failed' });
        } else {
          await showAlert('Login failed: ' + msg, { title: 'Login failed' });
        }
        
        console.log('[LOGIN] Resetting CAPTCHA after error');
        try { 
          turnstile.reset();
          await new Promise(resolve => setTimeout(resolve, 500));
        } catch (e) {
          console.error('[LOGIN] Turnstile reset failed:', e);
        }
        return;
      }

      console.log('[LOGIN] Success! Redirecting...');
      await showAlert('Login successful!', { title: 'Success' });
      try {
        const staffFlag = localStorage.getItem('staff_login');
        if (staffFlag) {
          // clear the flag immediately to avoid reuse
          try { localStorage.removeItem('staff_login'); } catch (e) {}
          // verify session and admin status
          try {
            const sessResp = await fetch('https://itlearn.pythonanywhere.com/api/session', {
              method: 'GET',
              credentials: 'include',
              cache: 'no-store'
            });
            const sess = await sessResp.json();
            if (sess && sess.logged_in && sess.is_bio_admin) {
              window.location.href = '/admin-panel.html';
              return;
            }
          } catch (e) {
            console.warn('[LOGIN] Staff redirect session check failed:', e);
          }
        }
      } catch (e) {
        console.warn('[LOGIN] Staff redirect check failed:', e);
      }

      window.location.href = "/learn/index.html";
    } catch (err) {
        console.error('[LOGIN] Exception:', err);
        await showAlert('An error occurred while logging in.', { title: 'Login error' });
        
        try { 
          turnstile.reset();
          await new Promise(resolve => setTimeout(resolve, 500));
        } catch {}
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
});
</script>
