  <script type="module">
    import { logout } from './ui/js/services/authService.js';
    import { navigateTo } from './ui/js/state/router.js';
    
    // Wait for DOM to be fully loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEventListeners);
    } else {
      initEventListeners();
    }
    
    async function initEventListeners() {
      const authBtn = document.getElementById('auth-btn');
      const dashboardLink = document.getElementById('dashboard-link');
      const projectsLink = document.getElementById('projects-link');
      const storeLink = document.getElementById('store-link');
      const profileLink = document.getElementById('profile-link');
      const settingsLink = document.getElementById('settings-link');
      const badgesLink = document.getElementById('badges-link');
      const sidebarLinks = [dashboardLink, projectsLink, storeLink, profileLink, badgesLink, settingsLink].filter(Boolean);

      function setActiveSidebarLink(activeLink) {
        sidebarLinks.forEach((link) => {
          link.classList.toggle('is-active', link === activeLink);
        });
      }
      
      if (authBtn) {
        authBtn.addEventListener('click', async function(e) {
          e.preventDefault();
          console.log('Logout button clicked');
          
          const result = await logout();
          
          if (result.success) {
            console.log('Logout successful, redirecting...');
            window.location.href = '/login.html';
          } else {
            console.error('Logout failed');
            await showAlert('Logout failed. Please try again.', { title: 'Logout failed' });
          }
        });
        console.log('Event listener attached to logout button');
      } else {
        console.error('Auth button not found!');
      }

      if (profileLink) {
        profileLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Profile link clicked');
          setActiveSidebarLink(profileLink);
          navigateTo({ route: 'profile' });
        });
        console.log('Event listener attached to profile link');
      } else {
        console.error('Profile link not found!');
      }

      if (dashboardLink) {
        dashboardLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Courses link clicked');
          setActiveSidebarLink(dashboardLink);
          navigateTo({ route: 'courses' });
        });
        console.log('Event listener attached to dashboard link');
      } else {
        console.error('Dashboard link not found!');
      }

      if (projectsLink) {
        projectsLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Projects link clicked');
          setActiveSidebarLink(projectsLink);
          navigateTo({ route: 'projects' });
        });
        console.log('Event listener attached to projects link');
      } else {
        console.error('Projects link not found!');
      }

      if (settingsLink) {
        settingsLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Settings link clicked');
          setActiveSidebarLink(settingsLink);
          navigateTo({ route: 'settings' });
        });
        console.log('Event listener attached to settings link');
      } else {
        console.error('Settings link not found!');
      }

      if (storeLink) {
        storeLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Store link clicked');
          setActiveSidebarLink(storeLink);
          navigateTo({ route: 'store' });
        });
        console.log('Event listener attached to store link');
      } else {
        console.error('Store link not found!');
      }

      if (badgesLink) {
        badgesLink.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('Badges link clicked');
          setActiveSidebarLink(badgesLink);
          navigateTo({ route: 'badges' });
        });
        console.log('Event listener attached to badges link');
      } else {
        console.error('Badges link not found!');
      }
    }
  </script>
  
  <script>
    (function () {
      function isAllowedOrigin(origin) {
        try {
          const u = new URL(origin);
          const hostname = u.hostname.toLowerCase();
          // Allow all localhost variants, loopback IP and subdomains of *.localhost
          if (
                  hostname === 'localhost' ||
                  hostname === '127.0.0.1' ||
                  hostname === '::1' ||
                  hostname.endsWith('.localhost')
          ) {
            return true;
          }
          // Allow itlearn.be and subdomains (http or https)
          if (hostname === 'itlearn.be' || hostname.endsWith('.itlearn.be')) {
            return true;
          }
          return false;
        } catch (e) {
          return false;
        }
      }

      function applyInjectedCSS(css) {
        const id = 'external-injected-style';
        let style = document.getElementById(id);
        if (!style) {
          style = document.createElement('style');
          style.id = id;
          document.head.appendChild(style);
        }
        // Replace style content
        style.textContent = css;
      }

      window.addEventListener('message', function (event) {
        // Accept same-origin (for local testing) or allowed origins
        if (event.origin !== window.location.origin && !isAllowedOrigin(event.origin)) {
          // ignore unauthorized origins
          if (event.source && event.source.postMessage) {
            event.source.postMessage(
                    { type: 'inject-response', status: 'error', reason: 'origin-not-allowed' },
                    event.origin
            );
          }
          return;
        }

        const msg = event.data;
        if (!msg || typeof msg !== 'object') {
          // ignore invalid messages
          return;
        }

        if (msg.type === 'inject-css') {
          const css = String(msg.css || '');
          // simple safety checks
          if (css.length > 20000) {
            event.source?.postMessage(
                    { type: 'inject-response', status: 'error', reason: 'css-too-large' },
                    event.origin
            );
            return;
          }
          try {
            applyInjectedCSS(css);
            event.source?.postMessage(
                    { type: 'inject-response', status: 'ok' },
                    event.origin
            );
          } catch (err) {
            event.source?.postMessage(
                    { type: 'inject-response', status: 'error', reason: 'apply-failed' },
                    event.origin
            );
          }
        }
      }, false);
    })();
  </script>
