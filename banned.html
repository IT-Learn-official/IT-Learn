<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Learn | Account Banned</title>
  <style>
    :root {
      --bg: #0d1020;
      --card: rgba(20, 26, 48, 0.92);
      --line: rgba(255, 255, 255, 0.16);
      --text: #e8efff;
      --muted: #9bb1d9;
      --danger: #ff6b6b;
      --accent: #5eead4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 450px at 15% -5%, #293d77, transparent 70%),
        radial-gradient(700px 400px at 100% 100%, #143b48, transparent 70%),
        var(--bg);
    }

    .card {
      width: min(640px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      display: grid;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      color: #ffd0d0;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .reason {
      border: 1px solid rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.12);
      color: #ffe5e5;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      text-decoration: none;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn-discord {
      border-color: rgba(94, 234, 212, 0.45);
      background: rgba(20, 184, 166, 0.2);
      color: #d5fffa;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 107, 107, 0.4);
      color: var(--danger);
      background: rgba(255, 107, 107, 0.15);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="icon" aria-hidden="true">!</div>
    <h1>This account is banned</h1>
    <p>You can appeal this decision in our Discord server by opening a support ticket.</p>
    <div id="reason" class="reason">Reason: Account suspended for severe rule violations.</div>
    <div class="actions">
      <a id="appeal-link" class="btn btn-discord" href="https://discord.gg/rKgF9s32EV" target="_blank" rel="noopener noreferrer">Open Discord Appeal</a>
      <a class="btn" href="/login.html">Back to Login</a>
      <a class="btn" href="/index.html">Home</a>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const reason = (params.get('reason') || '').trim();
      const appeal = (params.get('appeal') || '').trim();

      const reasonEl = document.getElementById('reason');
      const linkEl = document.getElementById('appeal-link');

      if (reason) {
        reasonEl.textContent = `Reason: ${reason}`;
      }

      if (appeal && /^https:\/\//i.test(appeal)) {
        linkEl.href = appeal;
      }
    })();
  </script>
</body>
</html>
