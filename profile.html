<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="canonical" href="https://itlearn.be/profile">
    <link rel="icon" href="/favicon.ico">
  
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
    <title>Profile | IT Learn</title>
    <meta name="description" content="User profile on IT Learn.">
    <meta name="robots" content="noindex, nofollow">
  
    <link rel="stylesheet" href="profile.css" />
  </head>
<body class="public-profile-page">
  <div class="profile-shell">
    <div class="profile-top">
      <a href="/index.html">Back to IT Learn</a>
      <div class="profile-top-actions">
        <span id="status">Loading profile...</span>
        <a id="admin-panel-link" class="admin-panel-link" href="/admin-panel.html" hidden>Open Admin Panel</a>
      </div>
    </div>

    <div id="profile-root"></div>
  </div>

  <script>
    const API_BASE = 'https://itlearn.pythonanywhere.com/api';
    const root = document.getElementById('profile-root');
    const status = document.getElementById('status');
    const adminPanelLink = document.getElementById('admin-panel-link');
    let currentSession = { logged_in: false, user_id: null, is_bio_admin: false };

    const query = new URLSearchParams(window.location.search);
    const fromQuery = query.get('u');
    const pathMatch = window.location.pathname.match(/^\/@([^/]+)/);
    const fromPath = pathMatch ? pathMatch[1] : null;
    const username = (fromQuery || fromPath || '').trim().toLowerCase();

    function renderErrorCard(message) {
      const card = document.createElement('div');
      card.className = 'error-card';

      const title = document.createElement('h3');
      title.textContent = 'Profile unavailable';

      const details = document.createElement('p');
      details.textContent = message;

      card.appendChild(title);
      card.appendChild(details);
      root.replaceChildren(card);
    }

    function createStat(label, value) {
      const stat = document.createElement('div');
      stat.className = 'stat';

      const strong = document.createElement('strong');
      strong.textContent = String(value);

      const span = document.createElement('span');
      span.textContent = label;

      stat.appendChild(strong);
      stat.appendChild(span);
      return stat;
    }

    function renderProfile(data, fallbackHandle) {
      const usernameValue = (data.username || fallbackHandle || 'user').toString();
      const firstLetter = usernameValue.charAt(0).toUpperCase() || 'U';

      const section = document.createElement('section');
      section.className = 'profile-card';

      const banner = document.createElement('div');
      banner.className = 'profile-banner';

      const main = document.createElement('div');
      main.className = 'profile-main';

      const avatar = document.createElement('div');
      avatar.className = 'profile-avatar';
      avatar.textContent = firstLetter;

      const profileId = document.createElement('div');
      profileId.className = 'profile-id';

      const heading = document.createElement('h1');
      heading.textContent = `@${usernameValue}`;

      const bio = document.createElement('p');
      bio.textContent = data.bio || 'This learner has not written a bio yet.';

      profileId.appendChild(heading);
      profileId.appendChild(bio);

      main.appendChild(avatar);
      main.appendChild(profileId);

      const stats = document.createElement('div');
      stats.className = 'stats';
      stats.appendChild(createStat('XP', Number(data.xp) || 0));
      stats.appendChild(createStat('Streak', Number(data.streak) || 0));
      stats.appendChild(createStat('Badges', Number(data.badges_unlocked) || 0));
      stats.appendChild(createStat('Last Active', data.last_active || 'n/a'));

      section.appendChild(banner);
      section.appendChild(main);
      section.appendChild(stats);

      const moderationPanel = createModerationPanel(usernameValue);
      root.replaceChildren(section, moderationPanel);
    }

    function createModerationPanel(usernameValue) {
      const panel = document.createElement('section');
      panel.className = 'moderation-card';

      const title = document.createElement('h3');
      title.textContent = 'Report bio';

      const caption = document.createElement('p');
      caption.className = 'moderation-caption';
      caption.textContent = 'Flag bios that contain harassment, hate, threats, or sexual content.';

      const reasonLabel = document.createElement('label');
      reasonLabel.textContent = 'Reason';
      reasonLabel.htmlFor = 'bio-report-reason';

      const reason = document.createElement('select');
      reason.id = 'bio-report-reason';
      ['Harassment or hate speech', 'Sexual content', 'Threats or violence', 'Other'].forEach((option) => {
        const el = document.createElement('option');
        el.value = option;
        el.textContent = option;
        reason.appendChild(el);
      });

      const detailsLabel = document.createElement('label');
      detailsLabel.textContent = 'Details (optional)';
      detailsLabel.htmlFor = 'bio-report-details';

      const details = document.createElement('textarea');
      details.id = 'bio-report-details';
      details.rows = 3;
      details.maxLength = 300;
      details.placeholder = 'Short context for moderators';

      const row = document.createElement('div');
      row.className = 'moderation-actions';

      const replacement = document.createElement('input');
      replacement.type = 'text';
      replacement.maxLength = 180;
      replacement.placeholder = 'Replacement text after ban (optional)';
      replacement.className = 'moderation-input';
      replacement.hidden = !currentSession.is_bio_admin;
      replacement.disabled = !currentSession.is_bio_admin;

      const reportBtn = document.createElement('button');
      reportBtn.type = 'button';
      reportBtn.textContent = 'Report bio';
      reportBtn.className = 'moderation-btn';

      const result = document.createElement('p');
      result.className = 'moderation-status';

      reportBtn.addEventListener('click', async () => {
        if (!currentSession.logged_in) {
          result.textContent = 'Please log in to report this bio.';
          return;
        }

        reportBtn.disabled = true;
        result.textContent = 'Submitting report...';
        try {
          const response = await fetch(`${API_BASE}/profile/report-bio`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              username: usernameValue,
              reason: reason.value,
              details: details.value.trim(),
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            result.textContent = data.error || 'Failed to submit report.';
            return;
          }
          details.value = '';
          result.textContent = 'Report submitted. Thank you.';
        } catch (error) {
          result.textContent = 'Network error. Please try again.';
        } finally {
          reportBtn.disabled = false;
        }
      });

      row.appendChild(reportBtn);

      if (currentSession.is_bio_admin) {
        const banBtn = document.createElement('button');
        banBtn.type = 'button';
        banBtn.className = 'moderation-btn danger';
        banBtn.textContent = 'Ban this bio';

        banBtn.addEventListener('click', async () => {
          banBtn.disabled = true;
          result.textContent = 'Applying bio ban...';
          try {
            const response = await fetch(`${API_BASE}/admin/profile/ban-bio`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                username: usernameValue,
                replacement_bio: replacement.value.trim(),
              }),
            });
            const data = await response.json();
            if (!response.ok) {
              result.textContent = data.error || 'Failed to ban bio.';
              return;
            }
            result.textContent = 'Bio banned successfully.';
            await loadProfile(usernameValue);
          } catch (error) {
            result.textContent = 'Network error. Please try again.';
          } finally {
            banBtn.disabled = false;
          }
        });

        row.appendChild(banBtn);
      }

      panel.appendChild(title);
      panel.appendChild(caption);
      panel.appendChild(reasonLabel);
      panel.appendChild(reason);
      panel.appendChild(detailsLabel);
      panel.appendChild(details);
      panel.appendChild(replacement);
      panel.appendChild(row);
      panel.appendChild(result);
      return panel;
    }

    async function loadSession() {
      try {
        const response = await fetch(`${API_BASE}/session`, {
          method: 'GET',
          credentials: 'include'
        });
        const data = await response.json();
        currentSession = {
          logged_in: Boolean(data.logged_in),
          user_id: data.user_id || null,
          is_bio_admin: Boolean(data.is_bio_admin),
        };
        adminPanelLink.hidden = !currentSession.is_bio_admin;
      } catch (error) {
        currentSession = { logged_in: false, user_id: null, is_bio_admin: false };
        adminPanelLink.hidden = true;
      }
    }

    async function loadProfile(handle) {
      try {
        const response = await fetch(`${API_BASE}/profile/${encodeURIComponent(handle)}`, {
          credentials: 'include'
        });
        const data = await response.json();

        if (!response.ok) {
          renderErrorCard(data.error || 'Unknown error');
          return;
        }

        renderProfile(data, handle);
      } catch (error) {
        renderErrorCard('Network error while loading profile.');
      }
    }

    async function init() {
      await loadSession();
      if (!username) {
        status.textContent = 'No username provided';
        renderErrorCard('Missing username in URL.');
        return;
      }

      status.textContent = `@${username}`;
      await loadProfile(username);
    }

    void init();
  </script>
</body>
</html>
